name: React CI Pipeline

on:
  push:
    branches:
      - development

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Node Version
        run: node -v

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build
